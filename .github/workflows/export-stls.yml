name: Export STLs

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install OpenSCAD (Nightly)
        run: |
          sudo add-apt-repository ppa:openscad/nightly -y
          sudo apt-get update
          sudo apt-get install openscad-nightly -y

      - name: Export Left Pillar
        run: openscad-nightly --enable=manifold -o mom_pillar_left.stl mom_pillar_left.scad

      - name: Export Right Pillar
        run: openscad-nightly --enable=manifold -o mom_pillar_right.stl mom_pillar_right.scad

      - name: Export 3D Preview Image
        run: openscad-nightly --enable=manifold --imgsize=1280,720 --camera=150,100,100,55,0,25,1200 -o preview.png mom_assembly.scad

      - name: Upload STLs as Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Cursed-Bone-Cabinet-STLs
          path: |
            mom_pillar_left.stl
            mom_pillar_right.stl
            preview.png
